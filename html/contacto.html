        <nav>
            <a href="../index.html">
                <img class="logo" src="../img/logo-nuevo.png" alt="Logo">

                <li> <a class="roboto-condensed" href="../index.html">Inicio</a></li>

                <li> <a class="roboto-condensed" href="./contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <h1 class="title">Contáctanos</h1>

        <section>
            <form action="#" class="form-container">
                <div class="form-group">
                    <label for="name">Nombre:</label>
                    <input type="text" required placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label for="lastname">Apellido:</label>
                    <input type="tel" required placeholder="Tu apellido">
                </div>
                <div class="form-group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" required placeholder="Tu email">
                </div>
                <div class="form-group">
                    <label for="phone">Teléfono:</label>
                    <input type="tel" required placeholder="Teléfono">
                </div>
                <div class="form-group">
                    <label for="reason">Motivo de contacto:</label>
                    <select name="reason" id="reason" required>
                        <option value="">Selecciona un motivo</option>
                        <option value="Duda">Duda</option>
                        <option value="Reclamo">Reclamo</option>
                        <option value="Sugerencia">Sugerencia</option>
                        <option value="Queja">Queja</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
                
                
                <div class="form-group">
                    <label for="Comment">Mensaje:</label>
                    <textarea rows="5" cols="60" name="Comment" id="Comment" required placeholder="Escribe tu mensaje aquí..."></textarea>
                </div>

                <div class="form-group-button-container">
                    <button class="btn btn-primary" type="submit">Enviar mensaje</button>
                    <button class="btn btn-danger" type="reset">Limpiar formulario</button>
                </div>


            </form>

            

        </section>
  

    </main>
